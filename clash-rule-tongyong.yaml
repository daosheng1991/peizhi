mixed-port: 7890                        # ← 用配置2
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'   # ← 用配置2（安全）

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip                # ← 用配置2（快）
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:                       # 兼容性修复
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  nameserver:                           # ← 用配置2（DoH）
    - 'https://dns.alidns.com/dns-query'
    - 'https://doh.pub/dns-query'
  
  fallback:                             # ← 用配置1（分流）
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.8.8/dns-query'
  
  fallback-filter:                      # 智能切换
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4